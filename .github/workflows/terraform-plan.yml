name: AEO Data Platform CI/CD

on:
  pull_request:
    branches: [ dev/** ]
  workflow_dispatch:

concurrency:
  group: terraform-dev
  cancel-in-progress: true

jobs:
  terraform-plan:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: '1.9.5'

    - uses: ./.github/actions/gcp-auth
      with:
        credentials_json: '${{ secrets.GCP_SA_KEY }}'

    - name: Terraform Plan DEV
      working-directory: ./terraform/envs/dev
      env:
        TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID_DEV }}
        TF_VAR_env: dev
      run: |
        terraform init
        terraform plan -var-file="../global.auto.tfvars" -out="terraform.output"
        terraform apply "terraform.output"